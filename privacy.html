en:{t:"Privacy Policy",d:"Effective Date: May 5, 2026",s1t:"Introduction",s1b:"TimelessDialogue (时空对话) is developed by Xuchen Sun. We are committed to protecting your privacy. This privacy policy explains how we handle information when you use our app, which allows you to have conversations with historical figures powered by AI.",s2t:"Information Collection",s2b:"We collect only the following information:",s2l:["Device identifierForVendor (a unique identifier assigned by Apple to your device for our app) — used solely for rate limiting and subscription verification."],s2n:"We do NOT collect:",s2nl:["Personal information (name, email, phone number)","Location data","Contacts","Photos or media","Browsing history","Any other personal data"],s3t:"How We Use Information",s3b:"The device identifierForVendor is used exclusively for:",s3l:["Rate limiting API requests to ensure fair usage","Verifying subscription status"],s3e:"Your conversations are processed through the DeepSeek AI API via a Cloudflare Worker to generate responses. These conversations are not stored on our servers and are not retained after the response is generated.",s4t:"Data Storage",s4b:"Your chat history is stored locally on your device only. We do not maintain user accounts or store your conversation data on any server. Subscription management is handled entirely by Apple's StoreKit framework.",s5t:"Third-Party Services",s5b:"Our app uses the following third-party services:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — for generating AI responses to your conversations','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — as an intermediary for API requests','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — for subscription management'],s5e:"We do not use any analytics services, advertising networks, or tracking technologies.",s6t:"Children's Privacy",s6b:"Our app is not directed at children under 13. We do not knowingly collect personal information from children. Since we only collect a device identifier and no personal information, the app poses minimal privacy risk to users of any age.",s7t:"Changes to This Policy",s7b:"We may update this privacy policy from time to time. Any changes will be reflected on this page with an updated effective date.",s8t:"Contact Us",s8b:"If you have any questions about this privacy policy, please contact us:",s8c:'Xuchen Sun<br>Email: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
"zh-Hans":{t:"隐私政策",d:"生效日期：2026年5月5日",s1t:"简介",s1b:"时空对话（TimelessDialogue）由孙旭辰开发。我们致力于保护您的隐私。本隐私政策说明了您在使用我们的应用时，我们如何处理信息。本应用让您可以与AI驱动的历史人物进行对话。",s2t:"信息收集",s2b:"我们仅收集以下信息：",s2l:["设备 identifierForVendor（Apple 为我们的应用分配给您设备的唯一标识符）——仅用于速率限制和订阅验证。"],s2n:"我们不会收集：",s2nl:["个人信息（姓名、邮箱、电话号码）","位置数据","通讯录","照片或媒体文件","浏览历史","任何其他个人数据"],s3t:"信息使用方式",s3b:"设备 identifierForVendor 仅用于：",s3l:["对 API 请求进行速率限制，以确保公平使用","验证订阅状态"],s3e:"您的对话通过 Cloudflare Worker 经由 DeepSeek AI API 处理以生成回复。这些对话不会存储在我们的服务器上，回复生成后也不会被保留。",s4t:"数据存储",s4b:"您的聊天记录仅存储在您的本地设备上。我们不维护用户账户，也不在任何服务器上存储您的对话数据。订阅管理完全由 Apple 的 StoreKit 框架处理。",s5t:"第三方服务",s5b:"我们的应用使用以下第三方服务：",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — 用于生成 AI 对话回复','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — 作为 API 请求的中间服务','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — 用于订阅管理'],s5e:"我们不使用任何分析服务、广告网络或跟踪技术。",s6t:"儿童隐私",s6b:"我们的应用不面向13岁以下的儿童。我们不会故意收集儿童的个人信息。由于我们仅收集设备标识符而不收集任何个人信息，本应用对任何年龄用户的隐私风险极低。",s7t:"政策变更",s7b:"我们可能会不时更新本隐私政策。任何变更都将在本页面上反映，并更新生效日期。",s8t:"联系我们",s8b:"如果您对本隐私政策有任何疑问，请联系我们：",s8c:'孙旭辰<br>邮箱：<a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
"zh-Hant":{t:"隱私權政策",d:"生效日期：2026年5月5日",s1t:"簡介",s1b:"時空對話（TimelessDialogue）由孫旭辰開發。我們致力於保護您的隱私。本隱私權政策說明了您在使用我們的應用程式時，我們如何處理資訊。本應用程式讓您可以與AI驅動的歷史人物進行對話。",s2t:"資訊收集",s2b:"我們僅收集以下資訊：",s2l:["裝置 identifierForVendor（Apple 為我們的應用程式指派給您裝置的唯一識別碼）——僅用於速率限制和訂閱驗證。"],s2n:"我們不會收集：",s2nl:["個人資訊（姓名、電子郵件、電話號碼）","位置資料","聯絡人","照片或媒體檔案","瀏覽紀錄","任何其他個人資料"],s3t:"資訊使用方式",s3b:"裝置 identifierForVendor 僅用於：",s3l:["對 API 請求進行速率限制，以確保公平使用","驗證訂閱狀態"],s3e:"您的對話透過 Cloudflare Worker 經由 DeepSeek AI API 處理以產生回覆。這些對話不會儲存在我們的伺服器上，回覆產生後也不會被保留。",s4t:"資料儲存",s4b:"您的聊天紀錄僅儲存在您的本機裝置上。我們不維護使用者帳戶，也不在任何伺服器上儲存您的對話資料。訂閱管理完全由 Apple 的 StoreKit 框架處理。",s5t:"第三方服務",s5b:"我們的應用程式使用以下第三方服務：",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — 用於產生 AI 對話回覆','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — 作為 API 請求的中介服務','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — 用於訂閱管理'],s5e:"我們不使用任何分析服務、廣告網路或追蹤技術。",s6t:"兒童隱私",s6b:"我們的應用程式不面向13歲以下的兒童。我們不會故意收集兒童的個人資訊。由於我們僅收集裝置識別碼而不收集任何個人資訊，本應用程式對任何年齡使用者的隱私風險極低。",s7t:"政策變更",s7b:"我們可能會不時更新本隱私權政策。任何變更都將在本頁面上反映，並更新生效日期。",s8t:"聯絡我們",s8b:"如果您對本隱私權政策有任何疑問，請聯絡我們：",s8c:'孫旭辰<br>電子郵件：<a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ja:{t:"プライバシーポリシー",d:"発効日：2026年5月5日",s1t:"はじめに",s1b:"TimelessDialogue（時空対話）はXuchen Sunが開発しました。私たちはお客様のプライバシー保護に努めています。このプライバシーポリシーでは、AIを活用して歴史上の人物と会話できる本アプリをご利用いただく際の情報の取り扱いについてご説明します。",s2t:"情報の収集",s2b:"以下の情報のみを収集します：",s2l:["デバイスのidentifierForVendor（Appleが当アプリに対してお客様のデバイスに割り当てる固有識別子）— レート制限とサブスクリプション検証にのみ使用されます。"],s2n:"以下の情報は収集しません：",s2nl:["個人情報（氏名、メールアドレス、電話番号）","位置情報","連絡先","写真やメディア","閲覧履歴","その他の個人データ"],s3t:"情報の利用方法",s3b:"デバイスのidentifierForVendorは以下の目的にのみ使用されます：",s3l:["公平な利用を確保するためのAPIリクエストのレート制限","サブスクリプション状態の検証"],s3e:"お客様の会話はCloudflare Workerを介してDeepSeek AI APIで処理され、応答が生成されます。これらの会話は当社のサーバーに保存されず、応答生成後も保持されません。",s4t:"データの保存",s4b:"チャット履歴はお客様のデバイスにのみローカル保存されます。ユーザーアカウントは維持せず、会話データをサーバーに保存することもありません。サブスクリプション管理はAppleのStoreKitフレームワークによって完全に処理されます。",s5t:"サードパーティサービス",s5b:"本アプリは以下のサードパーティサービスを使用しています：",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — AI応答の生成に使用','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — APIリクエストの中継として使用','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — サブスクリプション管理に使用'],s5e:"分析サービス、広告ネットワーク、トラッキング技術は一切使用していません。",s6t:"お子様のプライバシー",s6b:"本アプリは13歳未満のお子様を対象としていません。お子様の個人情報を意図的に収集することはありません。デバイス識別子のみを収集し個人情報は収集しないため、あらゆる年齢のユーザーに対するプライバシーリスクは最小限です。",s7t:"ポリシーの変更",s7b:"本プライバシーポリシーは随時更新される場合があります。変更がある場合は、このページに反映され、発効日が更新されます。",s8t:"お問い合わせ",s8b:"本プライバシーポリシーに関するご質問は、以下までお問い合わせください：",s8c:'Xuchen Sun<br>メール：<a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ko:{t:"개인정보 처리방침",d:"시행일: 2026년 5월 5일",s1t:"소개",s1b:"TimelessDialogue(시공대화)는 Xuchen Sun이 개발했습니다. 우리는 귀하의 개인정보 보호에 최선을 다하고 있습니다. 이 개인정보 처리방침은 AI를 활용하여 역사적 인물과 대화할 수 있는 본 앱 사용 시 정보를 어떻게 처리하는지 설명합니다.",s2t:"정보 수집",s2b:"다음 정보만 수집합니다:",s2l:["기기 identifierForVendor(Apple이 당사 앱에 대해 귀하의 기기에 할당하는 고유 식별자) — 요청 제한 및 구독 확인에만 사용됩니다."],s2n:"다음 정보는 수집하지 않습니다:",s2nl:["개인 정보(이름, 이메일, 전화번호)","위치 데이터","연락처","사진 또는 미디어","브라우징 기록","기타 개인 데이터"],s3t:"정보 사용 방법",s3b:"기기 identifierForVendor는 다음 목적으로만 사용됩니다:",s3l:["공정한 사용을 보장하기 위한 API 요청 속도 제한","구독 상태 확인"],s3e:"귀하의 대화는 Cloudflare Worker를 통해 DeepSeek AI API로 처리되어 응답이 생성됩니다. 이러한 대화는 당사 서버에 저장되지 않으며, 응답 생성 후에도 보존되지 않습니다.",s4t:"데이터 저장",s4b:"채팅 기록은 귀하의 기기에만 로컬로 저장됩니다. 사용자 계정을 유지하지 않으며, 대화 데이터를 서버에 저장하지 않습니다. 구독 관리는 Apple의 StoreKit 프레임워크를 통해 전적으로 처리됩니다.",s5t:"제3자 서비스",s5b:"본 앱은 다음 제3자 서비스를 사용합니다:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — AI 응답 생성에 사용','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — API 요청 중계에 사용','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — 구독 관리에 사용'],s5e:"분석 서비스, 광고 네트워크 또는 추적 기술을 사용하지 않습니다.",s6t:"아동 개인정보 보호",s6b:"본 앱은 13세 미만 아동을 대상으로 하지 않습니다. 아동의 개인 정보를 의도적으로 수집하지 않습니다. 기기 식별자만 수집하고 개인 정보는 수집하지 않으므로, 모든 연령대의 사용자에 대한 개인정보 위험은 최소화됩니다.",s7t:"정책 변경",s7b:"본 개인정보 처리방침은 수시로 업데이트될 수 있습니다. 변경 사항은 이 페이지에 반영되며 시행일이 업데이트됩니다.",s8t:"문의하기",s8b:"본 개인정보 처리방침에 대한 문의 사항이 있으시면 아래로 연락해 주세요:",s8c:'Xuchen Sun<br>이메일: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
fr:{t:"Politique de confidentialité",d:"Date d'entrée en vigueur : 5 mai 2026",s1t:"Introduction",s1b:"TimelessDialogue (时空对话) est développé par Xuchen Sun. Nous nous engageons à protéger votre vie privée. Cette politique de confidentialité explique comment nous traitons les informations lorsque vous utilisez notre application, qui vous permet de converser avec des personnages historiques grâce à l'IA.",s2t:"Collecte d'informations",s2b:"Nous collectons uniquement les informations suivantes :",s2l:["L'identifierForVendor de l'appareil (un identifiant unique attribué par Apple à votre appareil pour notre application) — utilisé uniquement pour la limitation du débit et la vérification des abonnements."],s2n:"Nous ne collectons PAS :",s2nl:["Les informations personnelles (nom, e-mail, numéro de téléphone)","Les données de localisation","Les contacts","Les photos ou médias","L'historique de navigation","Toute autre donnée personnelle"],s3t:"Utilisation des informations",s3b:"L'identifierForVendor de l'appareil est utilisé exclusivement pour :",s3l:["Limiter le débit des requêtes API pour garantir une utilisation équitable","Vérifier le statut de l'abonnement"],s3e:"Vos conversations sont traitées par l'API DeepSeek AI via un Cloudflare Worker pour générer des réponses. Ces conversations ne sont pas stockées sur nos serveurs et ne sont pas conservées après la génération de la réponse.",s4t:"Stockage des données",s4b:"Votre historique de conversation est stocké uniquement en local sur votre appareil. Nous ne maintenons pas de comptes utilisateurs et ne stockons pas vos données de conversation sur un serveur. La gestion des abonnements est entièrement assurée par le framework StoreKit d'Apple.",s5t:"Services tiers",s5b:"Notre application utilise les services tiers suivants :",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — pour la génération de réponses IA','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — comme intermédiaire pour les requêtes API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — pour la gestion des abonnements'],s5e:"Nous n'utilisons aucun service d'analyse, réseau publicitaire ou technologie de suivi.",s6t:"Confidentialité des enfants",s6b:"Notre application ne s'adresse pas aux enfants de moins de 13 ans. Nous ne collectons pas sciemment d'informations personnelles auprès des enfants. Étant donné que nous ne collectons qu'un identifiant d'appareil et aucune information personnelle, l'application présente un risque minimal pour la vie privée des utilisateurs de tout âge.",s7t:"Modifications de cette politique",s7b:"Nous pouvons mettre à jour cette politique de confidentialité de temps en temps. Toute modification sera reflétée sur cette page avec une date d'entrée en vigueur mise à jour.",s8t:"Nous contacter",s8b:"Si vous avez des questions concernant cette politique de confidentialité, veuillez nous contacter :",s8c:'Xuchen Sun<br>E-mail : <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
de:{t:"Datenschutzrichtlinie",d:"Gültig ab: 5. Mai 2026",s1t:"Einleitung",s1b:"TimelessDialogue (时空对话) wurde von Xuchen Sun entwickelt. Wir verpflichten uns zum Schutz Ihrer Privatsphäre. Diese Datenschutzrichtlinie erläutert, wie wir mit Informationen umgehen, wenn Sie unsere App nutzen, die es Ihnen ermöglicht, KI-gestützte Gespräche mit historischen Persönlichkeiten zu führen.",s2t:"Datenerhebung",s2b:"Wir erheben ausschließlich folgende Informationen:",s2l:["Den identifierForVendor des Geräts (eine von Apple für unsere App Ihrem Gerät zugewiesene eindeutige Kennung) — wird ausschließlich zur Ratenbegrenzung und Abonnementverifizierung verwendet."],s2n:"Wir erheben NICHT:",s2nl:["Persönliche Informationen (Name, E-Mail, Telefonnummer)","Standortdaten","Kontakte","Fotos oder Medien","Browserverlauf","Sonstige personenbezogene Daten"],s3t:"Verwendung der Informationen",s3b:"Der identifierForVendor des Geräts wird ausschließlich verwendet für:",s3l:["Ratenbegrenzung von API-Anfragen zur Gewährleistung einer fairen Nutzung","Verifizierung des Abonnementstatus"],s3e:"Ihre Gespräche werden über einen Cloudflare Worker durch die DeepSeek AI API verarbeitet, um Antworten zu generieren. Diese Gespräche werden nicht auf unseren Servern gespeichert und nach der Generierung der Antwort nicht aufbewahrt.",s4t:"Datenspeicherung",s4b:"Ihr Chatverlauf wird ausschließlich lokal auf Ihrem Gerät gespeichert. Wir führen keine Benutzerkonten und speichern Ihre Gesprächsdaten auf keinem Server. Die Abonnementverwaltung wird vollständig über Apples StoreKit-Framework abgewickelt.",s5t:"Drittanbieterdienste",s5b:"Unsere App nutzt folgende Drittanbieterdienste:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — zur Generierung von KI-Antworten','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — als Vermittler für API-Anfragen','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — zur Abonnementverwaltung'],s5e:"Wir verwenden keine Analysedienste, Werbenetzwerke oder Tracking-Technologien.",s6t:"Datenschutz für Kinder",s6b:"Unsere App richtet sich nicht an Kinder unter 13 Jahren. Wir erheben wissentlich keine personenbezogenen Daten von Kindern. Da wir nur eine Gerätekennung und keine persönlichen Informationen erheben, ist das Datenschutzrisiko für Nutzer jeden Alters minimal.",s7t:"Änderungen dieser Richtlinie",s7b:"Wir können diese Datenschutzrichtlinie von Zeit zu Zeit aktualisieren. Änderungen werden auf dieser Seite mit einem aktualisierten Gültigkeitsdatum veröffentlicht.",s8t:"Kontakt",s8b:"Wenn Sie Fragen zu dieser Datenschutzrichtlinie haben, kontaktieren Sie uns bitte:",s8c:'Xuchen Sun<br>E-Mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
es:{t:"Política de privacidad",d:"Fecha de vigencia: 5 de mayo de 2026",s1t:"Introducción",s1b:"TimelessDialogue (时空对话) es desarrollado por Xuchen Sun. Nos comprometemos a proteger su privacidad. Esta política de privacidad explica cómo manejamos la información cuando utiliza nuestra aplicación, que le permite conversar con figuras históricas mediante inteligencia artificial.",s2t:"Recopilación de información",s2b:"Solo recopilamos la siguiente información:",s2l:["El identifierForVendor del dispositivo (un identificador único asignado por Apple a su dispositivo para nuestra aplicación) — utilizado exclusivamente para la limitación de solicitudes y la verificación de suscripciones."],s2n:"NO recopilamos:",s2nl:["Información personal (nombre, correo electrónico, número de teléfono)","Datos de ubicación","Contactos","Fotos o medios","Historial de navegación","Cualquier otro dato personal"],s3t:"Uso de la información",s3b:"El identifierForVendor del dispositivo se utiliza exclusivamente para:",s3l:["Limitar la tasa de solicitudes API para garantizar un uso justo","Verificar el estado de la suscripción"],s3e:"Sus conversaciones se procesan a través de la API de DeepSeek AI mediante un Cloudflare Worker para generar respuestas. Estas conversaciones no se almacenan en nuestros servidores y no se retienen después de generar la respuesta.",s4t:"Almacenamiento de datos",s4b:"Su historial de chat se almacena únicamente de forma local en su dispositivo. No mantenemos cuentas de usuario ni almacenamos sus datos de conversación en ningún servidor. La gestión de suscripciones es manejada íntegramente por el framework StoreKit de Apple.",s5t:"Servicios de terceros",s5b:"Nuestra aplicación utiliza los siguientes servicios de terceros:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — para generar respuestas de IA','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — como intermediario para las solicitudes API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — para la gestión de suscripciones'],s5e:"No utilizamos servicios de análisis, redes publicitarias ni tecnologías de seguimiento.",s6t:"Privacidad de los niños",s6b:"Nuestra aplicación no está dirigida a menores de 13 años. No recopilamos conscientemente información personal de niños. Dado que solo recopilamos un identificador de dispositivo y ninguna información personal, la aplicación presenta un riesgo mínimo para la privacidad de usuarios de cualquier edad.",s7t:"Cambios en esta política",s7b:"Podemos actualizar esta política de privacidad periódicamente. Cualquier cambio se reflejará en esta página con una fecha de vigencia actualizada.",s8t:"Contáctenos",s8b:"Si tiene alguna pregunta sobre esta política de privacidad, contáctenos:",s8c:'Xuchen Sun<br>Correo electrónico: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
it:{t:"Informativa sulla privacy",d:"Data di entrata in vigore: 5 maggio 2026",s1t:"Introduzione",s1b:"TimelessDialogue (时空对话) è sviluppato da Xuchen Sun. Ci impegniamo a proteggere la vostra privacy. Questa informativa spiega come gestiamo le informazioni quando utilizzate la nostra app, che vi consente di conversare con personaggi storici grazie all'intelligenza artificiale.",s2t:"Raccolta delle informazioni",s2b:"Raccogliamo esclusivamente le seguenti informazioni:",s2l:["L'identifierForVendor del dispositivo (un identificatore univoco assegnato da Apple al vostro dispositivo per la nostra app) — utilizzato esclusivamente per la limitazione delle richieste e la verifica degli abbonamenti."],s2n:"NON raccogliamo:",s2nl:["Informazioni personali (nome, e-mail, numero di telefono)","Dati sulla posizione","Contatti","Foto o file multimediali","Cronologia di navigazione","Qualsiasi altro dato personale"],s3t:"Utilizzo delle informazioni",s3b:"L'identifierForVendor del dispositivo è utilizzato esclusivamente per:",s3l:["Limitare il numero di richieste API per garantire un utilizzo equo","Verificare lo stato dell'abbonamento"],s3e:"Le vostre conversazioni vengono elaborate tramite l'API DeepSeek AI attraverso un Cloudflare Worker per generare risposte. Queste conversazioni non vengono memorizzate sui nostri server e non vengono conservate dopo la generazione della risposta.",s4t:"Archiviazione dei dati",s4b:"La cronologia delle chat è archiviata esclusivamente in locale sul vostro dispositivo. Non manteniamo account utente né archiviamo i vostri dati di conversazione su alcun server. La gestione degli abbonamenti è interamente gestita dal framework StoreKit di Apple.",s5t:"Servizi di terze parti",s5b:"La nostra app utilizza i seguenti servizi di terze parti:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — per la generazione di risposte IA','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — come intermediario per le richieste API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — per la gestione degli abbonamenti'],s5e:"Non utilizziamo servizi di analisi, reti pubblicitarie o tecnologie di tracciamento.",s6t:"Privacy dei minori",s6b:"La nostra app non è rivolta a minori di 13 anni. Non raccogliamo consapevolmente informazioni personali da minori. Poiché raccogliamo solo un identificatore del dispositivo e nessuna informazione personale, l'app presenta un rischio minimo per la privacy degli utenti di qualsiasi età.",s7t:"Modifiche a questa informativa",s7b:"Potremmo aggiornare questa informativa di tanto in tanto. Eventuali modifiche saranno riportate su questa pagina con una data di entrata in vigore aggiornata.",s8t:"Contattaci",s8b:"Per qualsiasi domanda riguardante questa informativa, contattateci:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
"pt-BR":{t:"Política de Privacidade",d:"Data de vigência: 5 de maio de 2026",s1t:"Introdução",s1b:"O TimelessDialogue (时空对话) é desenvolvido por Xuchen Sun. Estamos comprometidos em proteger sua privacidade. Esta política de privacidade explica como lidamos com informações quando você usa nosso aplicativo, que permite conversar com figuras históricas por meio de inteligência artificial.",s2t:"Coleta de informações",s2b:"Coletamos apenas as seguintes informações:",s2l:["O identifierForVendor do dispositivo (um identificador único atribuído pela Apple ao seu dispositivo para nosso aplicativo) — usado exclusivamente para limitação de taxa e verificação de assinatura."],s2n:"NÃO coletamos:",s2nl:["Informações pessoais (nome, e-mail, número de telefone)","Dados de localização","Contatos","Fotos ou mídias","Histórico de navegação","Quaisquer outros dados pessoais"],s3t:"Como usamos as informações",s3b:"O identifierForVendor do dispositivo é usado exclusivamente para:",s3l:["Limitação de taxa de solicitações de API para garantir uso justo","Verificação do status da assinatura"],s3e:"Suas conversas são processadas pela API DeepSeek AI por meio de um Cloudflare Worker para gerar respostas. Essas conversas não são armazenadas em nossos servidores e não são retidas após a geração da resposta.",s4t:"Armazenamento de dados",s4b:"Seu histórico de chat é armazenado apenas localmente no seu dispositivo. Não mantemos contas de usuário nem armazenamos seus dados de conversa em nenhum servidor. O gerenciamento de assinaturas é feito inteiramente pelo framework StoreKit da Apple.",s5t:"Serviços de terceiros",s5b:"Nosso aplicativo utiliza os seguintes serviços de terceiros:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — para geração de respostas de IA','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — como intermediário para solicitações de API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — para gerenciamento de assinaturas'],s5e:"Não utilizamos serviços de análise, redes de publicidade ou tecnologias de rastreamento.",s6t:"Privacidade infantil",s6b:"Nosso aplicativo não é direcionado a crianças menores de 13 anos. Não coletamos intencionalmente informações pessoais de crianças. Como coletamos apenas um identificador de dispositivo e nenhuma informação pessoal, o aplicativo apresenta risco mínimo à privacidade de usuários de qualquer idade.",s7t:"Alterações nesta política",s7b:"Podemos atualizar esta política de privacidade periodicamente. Quaisquer alterações serão refletidas nesta página com uma data de vigência atualizada.",s8t:"Entre em contato",s8b:"Se você tiver alguma dúvida sobre esta política de privacidade, entre em contato conosco:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ru:{t:"Политика конфиденциальности",d:"Дата вступления в силу: 5 мая 2026 г.",s1t:"Введение",s1b:"TimelessDialogue (时空对话) разработан Xuchen Sun. Мы стремимся защищать вашу конфиденциальность. Настоящая политика конфиденциальности объясняет, как мы обрабатываем информацию при использовании вами нашего приложения, которое позволяет вести беседы с историческими личностями с помощью искусственного интеллекта.",s2t:"Сбор информации",s2b:"Мы собираем только следующую информацию:",s2l:["identifierForVendor устройства (уникальный идентификатор, присвоенный Apple вашему устройству для нашего приложения) — используется исключительно для ограничения частоты запросов и проверки подписки."],s2n:"Мы НЕ собираем:",s2nl:["Личную информацию (имя, электронную почту, номер телефона)","Данные о местоположении","Контакты","Фотографии или медиафайлы","Историю просмотров","Любые другие персональные данные"],s3t:"Использование информации",s3b:"identifierForVendor устройства используется исключительно для:",s3l:["Ограничения частоты API-запросов для обеспечения справедливого использования","Проверки статуса подписки"],s3e:"Ваши разговоры обрабатываются через API DeepSeek AI посредством Cloudflare Worker для генерации ответов. Эти разговоры не хранятся на наших серверах и не сохраняются после генерации ответа.",s4t:"Хранение данных",s4b:"История ваших чатов хранится только локально на вашем устройстве. Мы не ведём учётных записей пользователей и не храним данные ваших разговоров на каких-либо серверах. Управление подписками полностью осуществляется через фреймворк Apple StoreKit.",s5t:"Сторонние сервисы",s5b:"Наше приложение использует следующие сторонние сервисы:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — для генерации ответов ИИ','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — в качестве посредника для API-запросов','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — для управления подписками'],s5e:"Мы не используем аналитические сервисы, рекламные сети или технологии отслеживания.",s6t:"Конфиденциальность детей",s6b:"Наше приложение не предназначено для детей младше 13 лет. Мы сознательно не собираем личную информацию детей. Поскольку мы собираем только идентификатор устройства и не собираем личную информацию, приложение представляет минимальный риск для конфиденциальности пользователей любого возраста.",s7t:"Изменения в этой политике",s7b:"Мы можем время от времени обновлять настоящую политику конфиденциальности. Любые изменения будут отражены на этой странице с обновлённой датой вступления в силу.",s8t:"Свяжитесь с нами",s8b:"Если у вас есть вопросы по данной политике конфиденциальности, свяжитесь с нами:",s8c:'Xuchen Sun<br>Эл. почта: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ar:{t:"سياسة الخصوصية",d:"تاريخ السريان: 5 مايو 2026",s1t:"مقدمة",s1b:"تطبيق TimelessDialogue (时空对话) من تطوير Xuchen Sun. نحن ملتزمون بحماية خصوصيتك. توضح سياسة الخصوصية هذه كيفية تعاملنا مع المعلومات عند استخدامك لتطبيقنا الذي يتيح لك إجراء محادثات مع شخصيات تاريخية بواسطة الذكاء الاصطناعي.",s2t:"جمع المعلومات",s2b:"نقوم بجمع المعلومات التالية فقط:",s2l:["معرّف الجهاز identifierForVendor (معرّف فريد تعيّنه Apple لجهازك لتطبيقنا) — يُستخدم فقط لتحديد معدل الطلبات والتحقق من الاشتراك."],s2n:"لا نقوم بجمع:",s2nl:["المعلومات الشخصية (الاسم، البريد الإلكتروني، رقم الهاتف)","بيانات الموقع","جهات الاتصال","الصور أو الوسائط","سجل التصفح","أي بيانات شخصية أخرى"],s3t:"كيفية استخدام المعلومات",s3b:"يُستخدم معرّف الجهاز identifierForVendor حصرياً لـ:",s3l:["تحديد معدل طلبات API لضمان الاستخدام العادل","التحقق من حالة الاشتراك"],s3e:"تتم معالجة محادثاتك من خلال واجهة DeepSeek AI API عبر Cloudflare Worker لتوليد الردود. لا يتم تخزين هذه المحادثات على خوادمنا ولا يتم الاحتفاظ بها بعد توليد الرد.",s4t:"تخزين البيانات",s4b:"يتم تخزين سجل المحادثات محلياً على جهازك فقط. لا نحتفظ بحسابات مستخدمين ولا نخزّن بيانات محادثاتك على أي خادم. تتم إدارة الاشتراكات بالكامل من خلال إطار عمل Apple StoreKit.",s5t:"خدمات الطرف الثالث",s5b:"يستخدم تطبيقنا خدمات الطرف الثالث التالية:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — لتوليد ردود الذكاء الاصطناعي','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — كوسيط لطلبات API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — لإدارة الاشتراكات'],s5e:"لا نستخدم أي خدمات تحليلات أو شبكات إعلانية أو تقنيات تتبع.",s6t:"خصوصية الأطفال",s6b:"تطبيقنا غير موجّه للأطفال دون سن 13 عاماً. لا نقوم بجمع معلومات شخصية من الأطفال عن علم. نظراً لأننا نجمع فقط معرّف الجهاز ولا نجمع أي معلومات شخصية، فإن التطبيق يشكّل حداً أدنى من المخاطر على خصوصية المستخدمين من أي عمر.",s7t:"التغييرات على هذه السياسة",s7b:"قد نقوم بتحديث سياسة الخصوصية هذه من وقت لآخر. ستنعكس أي تغييرات على هذه الصفحة مع تحديث تاريخ السريان.",s8t:"اتصل بنا",s8b:"إذا كان لديك أي أسئلة حول سياسة الخصوصية هذه، يرجى التواصل معنا:",s8c:'Xuchen Sun<br>البريد الإلكتروني: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
hi:{t:"गोपनीयता नीति",d:"प्रभावी तिथि: 5 मई, 2026",s1t:"परिचय",s1b:"TimelessDialogue (时空对话) को Xuchen Sun द्वारा विकसित किया गया है। हम आपकी गोपनीयता की रक्षा के लिए प्रतिबद्ध हैं। यह गोपनीयता नीति बताती है कि जब आप हमारे ऐप का उपयोग करते हैं तो हम जानकारी को कैसे संभालते हैं। यह ऐप AI की सहायता से ऐतिहासिक व्यक्तियों के साथ बातचीत करने की सुविधा देता है।",s2t:"जानकारी का संग्रह",s2b:"हम केवल निम्नलिखित जानकारी एकत्र करते हैं:",s2l:["डिवाइस identifierForVendor (Apple द्वारा हमारे ऐप के लिए आपके डिवाइस को सौंपा गया एक विशिष्ट पहचानकर्ता) — केवल दर सीमित करने और सदस्यता सत्यापन के लिए उपयोग किया जाता है।"],s2n:"हम निम्नलिखित एकत्र नहीं करते:",s2nl:["व्यक्तिगत जानकारी (नाम, ईमेल, फ़ोन नंबर)","स्थान डेटा","संपर्क","फ़ोटो या मीडिया","ब्राउज़िंग इतिहास","कोई अन्य व्यक्तिगत डेटा"],s3t:"जानकारी का उपयोग",s3b:"डिवाइस identifierForVendor का उपयोग केवल इन उद्देश्यों के लिए किया जाता है:",s3l:["उचित उपयोग सुनिश्चित करने के लिए API अनुरोधों की दर सीमित करना","सदस्यता स्थिति का सत्यापन"],s3e:"आपकी बातचीत को उत्तर उत्पन्न करने के लिए Cloudflare Worker के माध्यम से DeepSeek AI API द्वारा संसाधित किया जाता है। ये बातचीत हमारे सर्वर पर संग्रहीत नहीं की जाती और उत्तर उत्पन्न होने के बाद बनाए नहीं रखी जाती।",s4t:"डेटा संग्रहण",s4b:"आपका चैट इतिहास केवल आपके डिवाइस पर स्थानीय रूप से संग्रहीत होता है। हम उपयोगकर्ता खाते नहीं रखते और आपके वार्तालाप डेटा को किसी भी सर्वर पर संग्रहीत नहीं करते। सदस्यता प्रबंधन पूरी तरह से Apple के StoreKit फ्रेमवर्क द्वारा किया जाता है।",s5t:"तृतीय-पक्ष सेवाएँ",s5b:"हमारा ऐप निम्नलिखित तृतीय-पक्ष सेवाओं का उपयोग करता है:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — AI उत्तर उत्पन्न करने के लिए','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — API अनुरोधों के लिए मध्यस्थ के रूप में','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — सदस्यता प्रबंधन के लिए'],s5e:"हम किसी भी एनालिटिक्स सेवा, विज्ञापन नेटवर्क या ट्रैकिंग तकनीक का उपयोग नहीं करते।",s6t:"बच्चों की गोपनीयता",s6b:"हमारा ऐप 13 वर्ष से कम आयु के बच्चों के लिए नहीं है। हम जानबूझकर बच्चों से व्यक्तिगत जानकारी एकत्र नहीं करते। चूँकि हम केवल एक डिवाइस पहचानकर्ता एकत्र करते हैं और कोई व्यक्तिगत जानकारी नहीं, इसलिए ऐप किसी भी उम्र के उपयोगकर्ताओं के लिए न्यूनतम गोपनीयता जोखिम प्रस्तुत करता है।",s7t:"इस नीति में परिवर्तन",s7b:"हम समय-समय पर इस गोपनीयता नीति को अपडेट कर सकते हैं। कोई भी परिवर्तन इस पृष्ठ पर अद्यतन प्रभावी तिथि के साथ प्रदर्शित किया जाएगा।",s8t:"हमसे संपर्क करें",s8b:"यदि इस गोपनीयता नीति के बारे में कोई प्रश्न है, तो कृपया हमसे संपर्क करें:",s8c:'Xuchen Sun<br>ईमेल: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
th:{t:"นโยบายความเป็นส่วนตัว",d:"วันที่มีผลบังคับใช้: 5 พฤษภาคม 2026",s1t:"บทนำ",s1b:"TimelessDialogue (时空对话) พัฒนาโดย Xuchen Sun เรามุ่งมั่นที่จะปกป้องความเป็นส่วนตัวของคุณ นโยบายนี้อธิบายวิธีที่เราจัดการข้อมูลเมื่อคุณใช้แอปของเรา ซึ่งช่วยให้คุณสนทนากับบุคคลในประวัติศาสตร์ผ่านปัญญาประดิษฐ์",s2t:"การเก็บรวบรวมข้อมูล",s2b:"เราเก็บรวบรวมเฉพาะข้อมูลต่อไปนี้:",s2l:["identifierForVendor ของอุปกรณ์ (ตัวระบุเฉพาะที่ Apple กำหนดให้อุปกรณ์ของคุณสำหรับแอปของเรา) — ใช้เพื่อจำกัดอัตราการใช้งานและตรวจสอบการสมัครสมาชิกเท่านั้น"],s2n:"เราไม่เก็บรวบรวม:",s2nl:["ข้อมูลส่วนบุคคล (ชื่อ อีเมล หมายเลขโทรศัพท์)","ข้อมูลตำแหน่ง","รายชื่อผู้ติดต่อ","รูปภาพหรือสื่อ","ประวัติการเรียกดู","ข้อมูลส่วนบุคคลอื่นๆ"],s3t:"วิธีที่เราใช้ข้อมูล",s3b:"identifierForVendor ของอุปกรณ์ถูกใช้เฉพาะเพื่อ:",s3l:["จำกัดอัตราคำขอ API เพื่อให้มั่นใจว่ามีการใช้งานอย่างเป็นธรรม","ตรวจสอบสถานะการสมัครสมาชิก"],s3e:"การสนทนาของคุณถูกประมวลผลผ่าน DeepSeek AI API โดย Cloudflare Worker เพื่อสร้างคำตอบ การสนทนาเหล่านี้ไม่ได้ถูกจัดเก็บบนเซิร์ฟเวอร์ของเราและไม่ถูกเก็บรักษาหลังจากสร้างคำตอบแล้ว",s4t:"การจัดเก็บข้อมูล",s4b:"ประวัติการแชทของคุณถูกจัดเก็บเฉพาะในเครื่องบนอุปกรณ์ของคุณเท่านั้น เราไม่มีบัญชีผู้ใช้และไม่จัดเก็บข้อมูลการสนทนาบนเซิร์ฟเวอร์ใดๆ การจัดการการสมัครสมาชิกดำเนินการโดย Apple StoreKit ทั้งหมด",s5t:"บริการของบุคคลที่สาม",s5b:"แอปของเราใช้บริการของบุคคลที่สามต่อไปนี้:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — สำหรับสร้างคำตอบ AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — เป็นตัวกลางสำหรับคำขอ API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — สำหรับการจัดการการสมัครสมาชิก'],s5e:"เราไม่ใช้บริการวิเคราะห์ เครือข่ายโฆษณา หรือเทคโนโลยีการติดตามใดๆ",s6t:"ความเป็นส่วนตัวของเด็ก",s6b:"แอปของเราไม่ได้มุ่งเป้าไปที่เด็กอายุต่ำกว่า 13 ปี เราไม่เก็บรวบรวมข้อมูลส่วนบุคคลจากเด็กโดยเจตนา เนื่องจากเราเก็บรวบรวมเฉพาะตัวระบุอุปกรณ์และไม่เก็บข้อมูลส่วนบุคคล แอปจึงมีความเสี่ยงต่อความเป็นส่วนตัวน้อยที่สุดสำหรับผู้ใช้ทุกวัย",s7t:"การเปลี่ยนแปลงนโยบายนี้",s7b:"เราอาจอัปเดตนโยบายความเป็นส่วนตัวนี้เป็นครั้งคราว การเปลี่ยนแปลงใดๆ จะแสดงในหน้านี้พร้อมวันที่มีผลบังคับใช้ที่อัปเดต",s8t:"ติดต่อเรา",s8b:"หากคุณมีคำถามเกี่ยวกับนโยบายนี้ กรุณาติดต่อเรา:",s8c:'Xuchen Sun<br>อีเมล: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
vi:{t:"Chính sách bảo mật",d:"Ngày hiệu lực: 5 tháng 5 năm 2026",s1t:"Giới thiệu",s1b:"TimelessDialogue (时空对话) được phát triển bởi Xuchen Sun. Chúng tôi cam kết bảo vệ quyền riêng tư của bạn. Chính sách này giải thích cách chúng tôi xử lý thông tin khi bạn sử dụng ứng dụng, cho phép bạn trò chuyện với các nhân vật lịch sử thông qua trí tuệ nhân tạo.",s2t:"Thu thập thông tin",s2b:"Chúng tôi chỉ thu thập thông tin sau:",s2l:["identifierForVendor của thiết bị (mã định danh duy nhất được Apple gán cho thiết bị của bạn cho ứng dụng của chúng tôi) — chỉ được sử dụng để giới hạn tốc độ và xác minh đăng ký."],s2n:"Chúng tôi KHÔNG thu thập:",s2nl:["Thông tin cá nhân (tên, email, số điện thoại)","Dữ liệu vị trí","Danh bạ","Ảnh hoặc phương tiện","Lịch sử duyệt web","Bất kỳ dữ liệu cá nhân nào khác"],s3t:"Cách chúng tôi sử dụng thông tin",s3b:"identifierForVendor của thiết bị được sử dụng độc quyền cho:",s3l:["Giới hạn tốc độ yêu cầu API để đảm bảo sử dụng công bằng","Xác minh trạng thái đăng ký"],s3e:"Các cuộc trò chuyện của bạn được xử lý qua DeepSeek AI API thông qua Cloudflare Worker để tạo phản hồi. Các cuộc trò chuyện này không được lưu trữ trên máy chủ của chúng tôi và không được giữ lại sau khi phản hồi được tạo.",s4t:"Lưu trữ dữ liệu",s4b:"Lịch sử trò chuyện chỉ được lưu trữ cục bộ trên thiết bị của bạn. Chúng tôi không duy trì tài khoản người dùng và không lưu trữ dữ liệu cuộc trò chuyện trên bất kỳ máy chủ nào. Quản lý đăng ký được xử lý hoàn toàn bởi framework StoreKit của Apple.",s5t:"Dịch vụ bên thứ ba",s5b:"Ứng dụng sử dụng các dịch vụ bên thứ ba sau:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — để tạo phản hồi AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — làm trung gian cho các yêu cầu API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — để quản lý đăng ký'],s5e:"Chúng tôi không sử dụng bất kỳ dịch vụ phân tích, mạng quảng cáo hoặc công nghệ theo dõi nào.",s6t:"Quyền riêng tư của trẻ em",s6b:"Ứng dụng không hướng đến trẻ em dưới 13 tuổi. Chúng tôi không cố ý thu thập thông tin cá nhân từ trẻ em. Vì chỉ thu thập mã định danh thiết bị và không thu thập thông tin cá nhân, ứng dụng có rủi ro tối thiểu về quyền riêng tư cho người dùng ở mọi lứa tuổi.",s7t:"Thay đổi chính sách",s7b:"Chúng tôi có thể cập nhật chính sách này theo thời gian. Bất kỳ thay đổi nào sẽ được phản ánh trên trang này với ngày hiệu lực được cập nhật.",s8t:"Liên hệ",s8b:"Nếu bạn có câu hỏi về chính sách này, vui lòng liên hệ:",s8c:'Xuchen Sun<br>Email: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
id:{t:"Kebijakan Privasi",d:"Tanggal Berlaku: 5 Mei 2026",s1t:"Pendahuluan",s1b:"TimelessDialogue (时空对话) dikembangkan oleh Xuchen Sun. Kami berkomitmen untuk melindungi privasi Anda. Kebijakan privasi ini menjelaskan bagaimana kami menangani informasi saat Anda menggunakan aplikasi kami, yang memungkinkan Anda bercakap-cakap dengan tokoh-tokoh sejarah menggunakan kecerdasan buatan.",s2t:"Pengumpulan Informasi",s2b:"Kami hanya mengumpulkan informasi berikut:",s2l:["identifierForVendor perangkat (pengenal unik yang ditetapkan oleh Apple untuk perangkat Anda untuk aplikasi kami) — digunakan hanya untuk pembatasan laju dan verifikasi langganan."],s2n:"Kami TIDAK mengumpulkan:",s2nl:["Informasi pribadi (nama, email, nomor telepon)","Data lokasi","Kontak","Foto atau media","Riwayat penjelajahan","Data pribadi lainnya"],s3t:"Cara Kami Menggunakan Informasi",s3b:"identifierForVendor perangkat digunakan secara eksklusif untuk:",s3l:["Membatasi laju permintaan API untuk memastikan penggunaan yang adil","Memverifikasi status langganan"],s3e:"Percakapan Anda diproses melalui DeepSeek AI API via Cloudflare Worker untuk menghasilkan respons. Percakapan ini tidak disimpan di server kami dan tidak dipertahankan setelah respons dihasilkan.",s4t:"Penyimpanan Data",s4b:"Riwayat obrolan Anda hanya disimpan secara lokal di perangkat Anda. Kami tidak memelihara akun pengguna dan tidak menyimpan data percakapan Anda di server mana pun. Manajemen langganan sepenuhnya ditangani oleh framework StoreKit Apple.",s5t:"Layanan Pihak Ketiga",s5b:"Aplikasi kami menggunakan layanan pihak ketiga berikut:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — untuk menghasilkan respons AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — sebagai perantara untuk permintaan API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — untuk manajemen langganan'],s5e:"Kami tidak menggunakan layanan analitik, jaringan iklan, atau teknologi pelacakan apa pun.",s6t:"Privasi Anak-anak",s6b:"Aplikasi kami tidak ditujukan untuk anak-anak di bawah 13 tahun. Kami tidak dengan sengaja mengumpulkan informasi pribadi dari anak-anak. Karena kami hanya mengumpulkan pengenal perangkat dan tidak mengumpulkan informasi pribadi, aplikasi ini memiliki risiko privasi minimal bagi pengguna dari segala usia.",s7t:"Perubahan Kebijakan",s7b:"Kami dapat memperbarui kebijakan privasi ini dari waktu ke waktu. Setiap perubahan akan tercermin di halaman ini dengan tanggal berlaku yang diperbarui.",s8t:"Hubungi Kami",s8b:"Jika Anda memiliki pertanyaan tentang kebijakan privasi ini, silakan hubungi kami:",s8c:'Xuchen Sun<br>Email: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ms:{t:"Dasar Privasi",d:"Tarikh Berkuat Kuasa: 5 Mei 2026",s1t:"Pengenalan",s1b:"TimelessDialogue (时空对话) dibangunkan oleh Xuchen Sun. Kami komited untuk melindungi privasi anda. Dasar privasi ini menerangkan cara kami mengendalikan maklumat apabila anda menggunakan aplikasi kami, yang membolehkan anda berbual dengan tokoh-tokoh sejarah menggunakan kecerdasan buatan.",s2t:"Pengumpulan Maklumat",s2b:"Kami hanya mengumpul maklumat berikut:",s2l:["identifierForVendor peranti (pengenal unik yang diberikan oleh Apple kepada peranti anda untuk aplikasi kami) — digunakan semata-mata untuk pengehadan kadar dan pengesahan langganan."],s2n:"Kami TIDAK mengumpul:",s2nl:["Maklumat peribadi (nama, e-mel, nombor telefon)","Data lokasi","Kenalan","Foto atau media","Sejarah pelayaran","Sebarang data peribadi lain"],s3t:"Cara Kami Menggunakan Maklumat",s3b:"identifierForVendor peranti digunakan secara eksklusif untuk:",s3l:["Mengehadkan kadar permintaan API untuk memastikan penggunaan yang adil","Mengesahkan status langganan"],s3e:"Perbualan anda diproses melalui DeepSeek AI API melalui Cloudflare Worker untuk menghasilkan respons. Perbualan ini tidak disimpan di pelayan kami dan tidak dikekalkan selepas respons dihasilkan.",s4t:"Penyimpanan Data",s4b:"Sejarah sembang anda hanya disimpan secara setempat pada peranti anda. Kami tidak mengekalkan akaun pengguna dan tidak menyimpan data perbualan anda di mana-mana pelayan. Pengurusan langganan dikendalikan sepenuhnya oleh rangka kerja StoreKit Apple.",s5t:"Perkhidmatan Pihak Ketiga",s5b:"Aplikasi kami menggunakan perkhidmatan pihak ketiga berikut:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — untuk menghasilkan respons AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — sebagai perantara untuk permintaan API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — untuk pengurusan langganan'],s5e:"Kami tidak menggunakan sebarang perkhidmatan analitik, rangkaian pengiklanan, atau teknologi penjejakan.",s6t:"Privasi Kanak-kanak",s6b:"Aplikasi kami tidak ditujukan kepada kanak-kanak di bawah umur 13 tahun. Kami tidak secara sedar mengumpul maklumat peribadi daripada kanak-kanak. Memandangkan kami hanya mengumpul pengenal peranti dan tiada maklumat peribadi, aplikasi ini menimbulkan risiko privasi yang minimum kepada pengguna dari sebarang umur.",s7t:"Perubahan Dasar",s7b:"Kami mungkin mengemas kini dasar privasi ini dari semasa ke semasa. Sebarang perubahan akan dipaparkan di halaman ini dengan tarikh berkuat kuasa yang dikemas kini.",s8t:"Hubungi Kami",s8b:"Jika anda mempunyai sebarang soalan mengenai dasar privasi ini, sila hubungi kami:",s8c:'Xuchen Sun<br>E-mel: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
tr:{t:"Gizlilik Politikası",d:"Yürürlük Tarihi: 5 Mayıs 2026",s1t:"Giriş",s1b:"TimelessDialogue (时空对话), Xuchen Sun tarafından geliştirilmiştir. Gizliliğinizi korumayı taahhüt ediyoruz. Bu gizlilik politikası, yapay zeka aracılığıyla tarihi kişiliklerle sohbet etmenizi sağlayan uygulamamızı kullandığınızda bilgileri nasıl işlediğimizi açıklamaktadır.",s2t:"Bilgi Toplama",s2b:"Yalnızca aşağıdaki bilgileri topluyoruz:",s2l:["Cihaz identifierForVendor (Apple tarafından uygulamamız için cihazınıza atanan benzersiz tanımlayıcı) — yalnızca hız sınırlama ve abonelik doğrulama için kullanılır."],s2n:"Toplamadığımız bilgiler:",s2nl:["Kişisel bilgiler (ad, e-posta, telefon numarası)","Konum verileri","Kişi listesi","Fotoğraf veya medya","Tarayıcı geçmişi","Diğer kişisel veriler"],s3t:"Bilgileri Nasıl Kullanıyoruz",s3b:"Cihaz identifierForVendor yalnızca şu amaçlarla kullanılır:",s3l:["Adil kullanımı sağlamak için API isteklerini hız sınırlama","Abonelik durumunu doğrulama"],s3e:"Konuşmalarınız, yanıt oluşturmak için Cloudflare Worker aracılığıyla DeepSeek AI API tarafından işlenmektedir. Bu konuşmalar sunucularımızda saklanmaz ve yanıt oluşturulduktan sonra tutulmaz.",s4t:"Veri Depolama",s4b:"Sohbet geçmişiniz yalnızca cihazınızda yerel olarak saklanır. Kullanıcı hesapları tutmuyoruz ve konuşma verilerinizi herhangi bir sunucuda saklamıyoruz. Abonelik yönetimi tamamen Apple'ın StoreKit çerçevesi tarafından gerçekleştirilir.",s5t:"Üçüncü Taraf Hizmetler",s5b:"Uygulamamız aşağıdaki üçüncü taraf hizmetleri kullanmaktadır:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — AI yanıtları oluşturmak için','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — API istekleri için aracı olarak','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — abonelik yönetimi için'],s5e:"Herhangi bir analitik hizmeti, reklam ağı veya izleme teknolojisi kullanmıyoruz.",s6t:"Çocukların Gizliliği",s6b:"Uygulamamız 13 yaşın altındaki çocuklara yönelik değildir. Çocuklardan bilerek kişisel bilgi toplamıyoruz. Yalnızca bir cihaz tanımlayıcısı topladığımız ve kişisel bilgi toplamadığımız için uygulama her yaştan kullanıcı için minimum gizlilik riski taşımaktadır.",s7t:"Politika Değişiklikleri",s7b:"Bu gizlilik politikasını zaman zaman güncelleyebiliriz. Değişiklikler güncellenmiş yürürlük tarihiyle bu sayfada yansıtılacaktır.",s8t:"Bize Ulaşın",s8b:"Bu gizlilik politikası hakkında sorularınız varsa lütfen bizimle iletişime geçin:",s8c:'Xuchen Sun<br>E-posta: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
uk:{t:"Політика конфіденційності",d:"Дата набрання чинності: 5 травня 2026 р.",s1t:"Вступ",s1b:"TimelessDialogue (时空对话) розроблений Xuchen Sun. Ми зобов'язуємося захищати вашу конфіденційність. Ця політика пояснює, як ми обробляємо інформацію, коли ви використовуєте наш додаток, який дозволяє вести розмови з історичними постатями за допомогою штучного інтелекту.",s2t:"Збір інформації",s2b:"Ми збираємо лише таку інформацію:",s2l:["identifierForVendor пристрою (унікальний ідентифікатор, присвоєний Apple вашому пристрою для нашого додатку) — використовується виключно для обмеження частоти запитів та перевірки підписки."],s2n:"Ми НЕ збираємо:",s2nl:["Особисту інформацію (ім'я, електронну пошту, номер телефону)","Дані про місцезнаходження","Контакти","Фотографії або медіафайли","Історію перегляду","Будь-які інші персональні дані"],s3t:"Як ми використовуємо інформацію",s3b:"identifierForVendor пристрою використовується виключно для:",s3l:["Обмеження частоти API-запитів для забезпечення справедливого використання","Перевірки статусу підписки"],s3e:"Ваші розмови обробляються через DeepSeek AI API за допомогою Cloudflare Worker для генерації відповідей. Ці розмови не зберігаються на наших серверах і не утримуються після генерації відповіді.",s4t:"Зберігання даних",s4b:"Історія ваших чатів зберігається лише локально на вашому пристрої. Ми не ведемо облікових записів користувачів і не зберігаємо дані ваших розмов на жодному сервері. Управління підписками повністю здійснюється через фреймворк Apple StoreKit.",s5t:"Сторонні сервіси",s5b:"Наш додаток використовує такі сторонні сервіси:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — для генерації відповідей ШІ','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — як посередник для API-запитів','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — для управління підписками'],s5e:"Ми не використовуємо жодних аналітичних сервісів, рекламних мереж чи технологій відстеження.",s6t:"Конфіденційність дітей",s6b:"Наш додаток не призначений для дітей віком до 13 років. Ми свідомо не збираємо особисту інформацію дітей. Оскільки ми збираємо лише ідентифікатор пристрою і не збираємо особисту інформацію, додаток становить мінімальний ризик для конфіденційності користувачів будь-якого віку.",s7t:"Зміни до цієї політики",s7b:"Ми можемо час від часу оновлювати цю політику конфіденційності. Будь-які зміни будуть відображені на цій сторінці з оновленою датою набрання чинності.",s8t:"Зв'яжіться з нами",s8b:"Якщо у вас є запитання щодо цієї політики, будь ласка, зв'яжіться з нами:",s8c:'Xuchen Sun<br>Ел. пошта: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
pl:{t:"Polityka prywatności",d:"Data wejścia w życie: 5 maja 2026 r.",s1t:"Wprowadzenie",s1b:"TimelessDialogue (时空对话) został opracowany przez Xuchen Sun. Zobowiązujemy się do ochrony Twojej prywatności. Niniejsza polityka prywatności wyjaśnia, w jaki sposób przetwarzamy informacje podczas korzystania z naszej aplikacji, która umożliwia prowadzenie rozmów z postaciami historycznymi przy użyciu sztucznej inteligencji.",s2t:"Gromadzenie informacji",s2b:"Gromadzimy wyłącznie następujące informacje:",s2l:["identifierForVendor urządzenia (unikalny identyfikator przypisany przez Apple Twojemu urządzeniu dla naszej aplikacji) — używany wyłącznie do ograniczania częstotliwości zapytań i weryfikacji subskrypcji."],s2n:"NIE gromadzimy:",s2nl:["Danych osobowych (imię, e-mail, numer telefonu)","Danych lokalizacyjnych","Kontaktów","Zdjęć lub multimediów","Historii przeglądania","Jakichkolwiek innych danych osobowych"],s3t:"Jak wykorzystujemy informacje",s3b:"identifierForVendor urządzenia jest używany wyłącznie do:",s3l:["Ograniczania częstotliwości zapytań API w celu zapewnienia sprawiedliwego użytkowania","Weryfikacji statusu subskrypcji"],s3e:"Twoje rozmowy są przetwarzane przez DeepSeek AI API za pośrednictwem Cloudflare Worker w celu generowania odpowiedzi. Rozmowy te nie są przechowywane na naszych serwerach i nie są zachowywane po wygenerowaniu odpowiedzi.",s4t:"Przechowywanie danych",s4b:"Historia Twoich czatów jest przechowywana wyłącznie lokalnie na Twoim urządzeniu. Nie prowadzimy kont użytkowników ani nie przechowujemy danych rozmów na żadnym serwerze. Zarządzanie subskrypcjami jest w pełni obsługiwane przez framework Apple StoreKit.",s5t:"Usługi stron trzecich",s5b:"Nasza aplikacja korzysta z następujących usług stron trzecich:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — do generowania odpowiedzi AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — jako pośrednik dla zapytań API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — do zarządzania subskrypcjami'],s5e:"Nie korzystamy z żadnych usług analitycznych, sieci reklamowych ani technologii śledzenia.",s6t:"Prywatność dzieci",s6b:"Nasza aplikacja nie jest skierowana do dzieci poniżej 13 roku życia. Nie gromadzimy świadomie danych osobowych dzieci. Ponieważ gromadzimy jedynie identyfikator urządzenia i nie zbieramy danych osobowych, aplikacja stanowi minimalne ryzyko dla prywatności użytkowników w każdym wieku.",s7t:"Zmiany w polityce",s7b:"Możemy od czasu do czasu aktualizować niniejszą politykę prywatności. Wszelkie zmiany zostaną odzwierciedlone na tej stronie z zaktualizowaną datą wejścia w życie.",s8t:"Kontakt",s8b:"Jeśli masz pytania dotyczące niniejszej polityki prywatności, skontaktuj się z nami:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
nl:{t:"Privacybeleid",d:"Ingangsdatum: 5 mei 2026",s1t:"Inleiding",s1b:"TimelessDialogue (时空对话) is ontwikkeld door Xuchen Sun. Wij zijn toegewijd aan het beschermen van uw privacy. Dit privacybeleid legt uit hoe wij met informatie omgaan wanneer u onze app gebruikt, waarmee u gesprekken kunt voeren met historische figuren met behulp van kunstmatige intelligentie.",s2t:"Informatieverzameling",s2b:"Wij verzamelen uitsluitend de volgende informatie:",s2l:["De identifierForVendor van het apparaat (een unieke identificatiecode die door Apple aan uw apparaat is toegewezen voor onze app) — uitsluitend gebruikt voor snelheidsbeperking en abonnementsverificatie."],s2n:"Wij verzamelen NIET:",s2nl:["Persoonlijke informatie (naam, e-mail, telefoonnummer)","Locatiegegevens","Contacten","Foto's of media","Browsegeschiedenis","Andere persoonlijke gegevens"],s3t:"Hoe wij informatie gebruiken",s3b:"De identifierForVendor wordt uitsluitend gebruikt voor:",s3l:["Het beperken van API-verzoeken om eerlijk gebruik te waarborgen","Het verifiëren van de abonnementsstatus"],s3e:"Uw gesprekken worden verwerkt via de DeepSeek AI API door middel van een Cloudflare Worker om antwoorden te genereren. Deze gesprekken worden niet opgeslagen op onze servers en worden niet bewaard na het genereren van het antwoord.",s4t:"Gegevensopslag",s4b:"Uw chatgeschiedenis wordt uitsluitend lokaal op uw apparaat opgeslagen. Wij onderhouden geen gebruikersaccounts en slaan uw gespreksgegevens niet op op enige server. Abonnementsbeheer wordt volledig afgehandeld door Apple's StoreKit-framework.",s5t:"Diensten van derden",s5b:"Onze app maakt gebruik van de volgende diensten van derden:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — voor het genereren van AI-antwoorden','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — als tussenpersoon voor API-verzoeken','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — voor abonnementsbeheer'],s5e:"Wij gebruiken geen analysediensten, advertentienetwerken of trackingtechnologieën.",s6t:"Privacy van kinderen",s6b:"Onze app is niet gericht op kinderen onder de 13 jaar. Wij verzamelen niet bewust persoonlijke informatie van kinderen. Aangezien wij alleen een apparaat-identificatiecode verzamelen en geen persoonlijke informatie, vormt de app een minimaal privacyrisico voor gebruikers van alle leeftijden.",s7t:"Wijzigingen in dit beleid",s7b:"Wij kunnen dit privacybeleid van tijd tot tijd bijwerken. Eventuele wijzigingen worden op deze pagina weergegeven met een bijgewerkte ingangsdatum.",s8t:"Neem contact op",s8b:"Als u vragen heeft over dit privacybeleid, neem dan contact met ons op:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
sv:{t:"Integritetspolicy",d:"Gäller från: 5 maj 2026",s1t:"Inledning",s1b:"TimelessDialogue (时空对话) är utvecklad av Xuchen Sun. Vi är engagerade i att skydda din integritet. Denna integritetspolicy förklarar hur vi hanterar information när du använder vår app, som låter dig föra samtal med historiska personer med hjälp av artificiell intelligens.",s2t:"Insamling av information",s2b:"Vi samlar endast in följande information:",s2l:["Enhetens identifierForVendor (en unik identifierare som Apple tilldelar din enhet för vår app) — används enbart för hastighetsbegränsning och prenumerationsverifiering."],s2n:"Vi samlar INTE in:",s2nl:["Personlig information (namn, e-post, telefonnummer)","Platsdata","Kontakter","Foton eller media","Webbhistorik","Andra personuppgifter"],s3t:"Hur vi använder information",s3b:"Enhetens identifierForVendor används uteslutande för:",s3l:["Hastighetsbegränsning av API-förfrågningar för att säkerställa rättvis användning","Verifiering av prenumerationsstatus"],s3e:"Dina konversationer bearbetas via DeepSeek AI API genom en Cloudflare Worker för att generera svar. Dessa konversationer lagras inte på våra servrar och behålls inte efter att svaret har genererats.",s4t:"Datalagring",s4b:"Din chatthistorik lagras endast lokalt på din enhet. Vi har inga användarkonton och lagrar inte dina konversationsdata på någon server. Prenumerationshantering sköts helt av Apples StoreKit-ramverk.",s5t:"Tredjepartstjänster",s5b:"Vår app använder följande tredjepartstjänster:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — för att generera AI-svar','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — som mellanhand för API-förfrågningar','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — för prenumerationshantering'],s5e:"Vi använder inga analystjänster, annonsnätverk eller spårningstekniker.",s6t:"Barns integritet",s6b:"Vår app riktar sig inte till barn under 13 år. Vi samlar inte medvetet in personlig information från barn. Eftersom vi endast samlar in en enhetsidentifierare och ingen personlig information utgör appen minimal integritetsrisk för användare i alla åldrar.",s7t:"Ändringar av denna policy",s7b:"Vi kan uppdatera denna integritetspolicy då och då. Eventuella ändringar kommer att återspeglas på denna sida med ett uppdaterat giltighetsdatum.",s8t:"Kontakta oss",s8b:"Om du har frågor om denna integritetspolicy, kontakta oss:",s8c:'Xuchen Sun<br>E-post: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},

fi:{t:"Tietosuojakäytäntö",d:"Voimaantulopäivä: 5. toukokuuta 2026",s1t:"Johdanto",s1b:"TimelessDialogue (时空对话) on Xuchen Sunin kehittämä. Olemme sitoutuneet suojaamaan yksityisyyttäsi. Tämä tietosuojakäytäntö selittää, miten käsittelemme tietoja, kun käytät sovellustamme, joka mahdollistaa keskustelut historiallisten henkilöiden kanssa tekoälyn avulla.",s2t:"Tietojen kerääminen",s2b:"Keräämme ainoastaan seuraavat tiedot:",s2l:["Laitteen identifierForVendor (Applen sovelluksellemme laitteellesi määrittämä yksilöllinen tunniste) — käytetään ainoastaan nopeusrajoitukseen ja tilauksen vahvistamiseen."],s2n:"EMME kerää:",s2nl:["Henkilökohtaisia tietoja (nimi, sähköposti, puhelinnumero)","Sijaintitietoja","Yhteystietoja","Valokuvia tai mediaa","Selaushistoriaa","Muita henkilötietoja"],s3t:"Miten käytämme tietoja",s3b:"Laitteen identifierForVendoria käytetään yksinomaan:",s3l:["API-pyyntöjen nopeusrajoitukseen reilun käytön varmistamiseksi","Tilauksen tilan vahvistamiseen"],s3e:"Keskustelusi käsitellään DeepSeek AI API:n kautta Cloudflare Workerin välityksellä vastausten tuottamiseksi. Näitä keskusteluja ei tallenneta palvelimillemme eikä säilytetä vastauksen tuottamisen jälkeen.",s4t:"Tietojen tallennus",s4b:"Keskusteluhistoriasi tallennetaan ainoastaan paikallisesti laitteellesi. Emme ylläpidä käyttäjätilejä emmekä tallenna keskustelutietojasi millekään palvelimelle. Tilausten hallinta hoidetaan kokonaan Applen StoreKit-kehyksen kautta.",s5t:"Kolmannen osapuolen palvelut",s5b:"Sovelluksemme käyttää seuraavia kolmannen osapuolen palveluja:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — tekoälyvastausten tuottamiseen','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — välittäjänä API-pyynnöille','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — tilausten hallintaan'],s5e:"Emme käytä analytiikkapalveluja, mainosverkostoja tai seurantateknologioita.",s6t:"Lasten yksityisyys",s6b:"Sovelluksemme ei ole suunnattu alle 13-vuotiaille lapsille. Emme tietoisesti kerää henkilökohtaisia tietoja lapsilta. Koska keräämme vain laitetunnisteen emmekä henkilökohtaisia tietoja, sovellus aiheuttaa minimaalisen yksityisyysriskin kaikenikäisille käyttäjille.",s7t:"Muutokset tähän käytäntöön",s7b:"Voimme päivittää tätä tietosuojakäytäntöä ajoittain. Mahdolliset muutokset näkyvät tällä sivulla päivitetyllä voimaantulopäivällä.",s8t:"Ota yhteyttä",s8b:"Jos sinulla on kysyttävää tästä tietosuojakäytännöstä, ota meihin yhteyttä:",s8c:'Xuchen Sun<br>Sähköposti: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
cs:{t:"Zásady ochrany osobních údajů",d:"Datum účinnosti: 5. května 2026",s1t:"Úvod",s1b:"TimelessDialogue (时空对话) je vyvinut Xuchen Sunem. Zavazujeme se chránit vaše soukromí. Tyto zásady vysvětlují, jak nakládáme s informacemi, když používáte naši aplikaci, která vám umožňuje vést konverzace s historickými osobnostmi pomocí umělé inteligence.",s2t:"Shromažďování informací",s2b:"Shromažďujeme pouze následující informace:",s2l:["identifierForVendor zařízení (jedinečný identifikátor přiřazený společností Apple vašemu zařízení pro naši aplikaci) — používaný výhradně pro omezení četnosti požadavků a ověření předplatného."],s2n:"Neshromažďujeme:",s2nl:["Osobní údaje (jméno, e-mail, telefonní číslo)","Údaje o poloze","Kontakty","Fotografie nebo média","Historii prohlížení","Jakékoliv další osobní údaje"],s3t:"Jak používáme informace",s3b:"identifierForVendor zařízení je používán výhradně pro:",s3l:["Omezení četnosti API požadavků pro zajištění spravedlivého používání","Ověření stavu předplatného"],s3e:"Vaše konverzace jsou zpracovávány prostřednictvím DeepSeek AI API přes Cloudflare Worker pro generování odpovědí. Tyto konverzace nejsou ukládány na našich serverech a nejsou uchovávány po vygenerování odpovědi.",s4t:"Ukládání dat",s4b:"Vaše historie chatů je ukládána pouze lokálně na vašem zařízení. Nevedeme uživatelské účty a neukládáme vaše konverzační data na žádný server. Správa předplatného je plně zajištěna frameworkem Apple StoreKit.",s5t:"Služby třetích stran",s5b:"Naše aplikace využívá následující služby třetích stran:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — pro generování AI odpovědí','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — jako prostředník pro API požadavky','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — pro správu předplatného'],s5e:"Nepoužíváme žádné analytické služby, reklamní sítě ani sledovací technologie.",s6t:"Ochrana soukromí dětí",s6b:"Naše aplikace není určena dětem mladším 13 let. Vědomě neshromažďujeme osobní údaje dětí. Jelikož shromažďujeme pouze identifikátor zařízení a žádné osobní údaje, aplikace představuje minimální riziko pro soukromí uživatelů jakéhokoli věku.",s7t:"Změny těchto zásad",s7b:"Tyto zásady můžeme čas od času aktualizovat. Veškeré změny budou zveřejněny na této stránce s aktualizovaným datem účinnosti.",s8t:"Kontaktujte nás",s8b:"Máte-li dotazy ohledně těchto zásad, kontaktujte nás:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
sk:{t:"Zásady ochrany súkromia",d:"Dátum účinnosti: 5. mája 2026",s1t:"Úvod",s1b:"TimelessDialogue (时空对话) je vyvinutý Xuchen Sunom. Zaväzujeme sa chrániť vaše súkromie. Tieto zásady vysvetľujú, ako narábame s informáciami, keď používate našu aplikáciu, ktorá vám umožňuje viesť konverzácie s historickými osobnosťami pomocou umelej inteligencie.",s2t:"Zhromažďovanie informácií",s2b:"Zhromažďujeme iba nasledujúce informácie:",s2l:["identifierForVendor zariadenia (jedinečný identifikátor priradený spoločnosťou Apple vášmu zariadeniu pre našu aplikáciu) — používaný výhradne na obmedzenie frekvencie požiadaviek a overenie predplatného."],s2n:"Nezhromažďujeme:",s2nl:["Osobné údaje (meno, e-mail, telefónne číslo)","Údaje o polohe","Kontakty","Fotografie alebo médiá","Históriu prehliadania","Akékoľvek iné osobné údaje"],s3t:"Ako používame informácie",s3b:"identifierForVendor zariadenia sa používa výhradne na:",s3l:["Obmedzenie frekvencie API požiadaviek na zabezpečenie spravodlivého používania","Overenie stavu predplatného"],s3e:"Vaše konverzácie sú spracovávané prostredníctvom DeepSeek AI API cez Cloudflare Worker na generovanie odpovedí. Tieto konverzácie nie sú ukladané na našich serveroch a nie sú uchovávané po vygenerovaní odpovede.",s4t:"Uchovávanie údajov",s4b:"Vaša história chatov je ukladaná iba lokálne na vašom zariadení. Nevedieme používateľské účty a neukladáme vaše konverzačné údaje na žiadny server. Správa predplatného je plne zabezpečená frameworkom Apple StoreKit.",s5t:"Služby tretích strán",s5b:"Naša aplikácia využíva nasledujúce služby tretích strán:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — na generovanie AI odpovedí','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — ako sprostredkovateľ pre API požiadavky','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — na správu predplatného'],s5e:"Nepoužívame žiadne analytické služby, reklamné siete ani sledovacie technológie.",s6t:"Ochrana súkromia detí",s6b:"Naša aplikácia nie je určená deťom mladším ako 13 rokov. Vedome nezhromažďujeme osobné údaje detí. Keďže zhromažďujeme iba identifikátor zariadenia a žiadne osobné údaje, aplikácia predstavuje minimálne riziko pre súkromie používateľov akéhokoľvek veku.",s7t:"Zmeny týchto zásad",s7b:"Tieto zásady môžeme z času na čas aktualizovať. Akékoľvek zmeny budú zverejnené na tejto stránke s aktualizovaným dátumom účinnosti.",s8t:"Kontaktujte nás",s8b:"Ak máte otázky ohľadom týchto zásad, kontaktujte nás:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
hu:{t:"Adatvédelmi irányelvek",d:"Hatályba lépés: 2026. május 5.",s1t:"Bevezetés",s1b:"A TimelessDialogue (时空对话) alkalmazást Xuchen Sun fejlesztette. Elkötelezettek vagyunk az Ön adatainak védelme iránt. Ez az adatvédelmi irányelv elmagyarázza, hogyan kezeljük az információkat, amikor alkalmazásunkat használja, amely lehetővé teszi, hogy történelmi személyiségekkel beszélgessen mesterséges intelligencia segítségével.",s2t:"Információgyűjtés",s2b:"Kizárólag az alábbi információkat gyűjtjük:",s2l:["Az eszköz identifierForVendor azonosítója (az Apple által az Ön eszközéhez az alkalmazásunkhoz rendelt egyedi azonosító) — kizárólag sebességkorlátozásra és előfizetés-ellenőrzésre használjuk."],s2n:"NEM gyűjtünk:",s2nl:["Személyes adatokat (név, e-mail, telefonszám)","Helyadatokat","Névjegyeket","Fényképeket vagy médiát","Böngészési előzményeket","Semmilyen egyéb személyes adatot"],s3t:"Hogyan használjuk az információkat",s3b:"Az eszköz identifierForVendor azonosítóját kizárólag a következőkre használjuk:",s3l:["API-kérések sebességkorlátozása a méltányos használat biztosítása érdekében","Előfizetési állapot ellenőrzése"],s3e:"Beszélgetéseit a DeepSeek AI API dolgozza fel egy Cloudflare Workeren keresztül a válaszok generálásához. Ezeket a beszélgetéseket nem tároljuk szervereiken, és a válasz generálása után nem őrizzük meg.",s4t:"Adattárolás",s4b:"A csevegési előzmények kizárólag az Ön eszközén, helyben tárolódnak. Nem tartunk fenn felhasználói fiókokat, és nem tároljuk beszélgetési adatait semmilyen szerveren. Az előfizetések kezelését teljes egészében az Apple StoreKit keretrendszere végzi.",s5t:"Harmadik fél szolgáltatásai",s5b:"Alkalmazásunk az alábbi harmadik fél szolgáltatásait használja:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — AI-válaszok generálásához','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — közvetítőként az API-kérésekhez','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — előfizetések kezeléséhez'],s5e:"Nem használunk semmilyen elemzési szolgáltatást, hirdetési hálózatot vagy nyomkövető technológiát.",s6t:"Gyermekek adatvédelme",s6b:"Alkalmazásunk nem 13 év alatti gyermekeknek szól. Nem gyűjtünk tudatosan személyes adatokat gyermekektől. Mivel csak egy eszközazonosítót gyűjtünk és semmilyen személyes információt nem, az alkalmazás minimális adatvédelmi kockázatot jelent bármely életkorú felhasználó számára.",s7t:"Az irányelvek módosításai",s7b:"Időről időre frissíthetjük ezt az adatvédelmi irányelvet. Változások ezen az oldalon, frissített hatályba lépési dátummal kerülnek közzétételre.",s8t:"Kapcsolat",s8b:"Ha kérdése van ezen adatvédelmi irányelvvel kapcsolatban, lépjen kapcsolatba velünk:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ro:{t:"Politica de confidențialitate",d:"Data intrării în vigoare: 5 mai 2026",s1t:"Introducere",s1b:"TimelessDialogue (时空对话) este dezvoltat de Xuchen Sun. Ne angajăm să vă protejăm confidențialitatea. Această politică explică modul în care gestionăm informațiile atunci când utilizați aplicația noastră, care vă permite să conversați cu personalități istorice prin intermediul inteligenței artificiale.",s2t:"Colectarea informațiilor",s2b:"Colectăm doar următoarele informații:",s2l:["identifierForVendor al dispozitivului (un identificator unic atribuit de Apple dispozitivului dumneavoastră pentru aplicația noastră) — utilizat exclusiv pentru limitarea ratei și verificarea abonamentului."],s2n:"NU colectăm:",s2nl:["Informații personale (nume, e-mail, număr de telefon)","Date de localizare","Contacte","Fotografii sau media","Istoricul navigării","Orice alte date personale"],s3t:"Cum utilizăm informațiile",s3b:"identifierForVendor al dispozitivului este utilizat exclusiv pentru:",s3l:["Limitarea ratei solicitărilor API pentru a asigura utilizarea echitabilă","Verificarea stării abonamentului"],s3e:"Conversațiile dumneavoastră sunt procesate prin DeepSeek AI API via un Cloudflare Worker pentru a genera răspunsuri. Aceste conversații nu sunt stocate pe serverele noastre și nu sunt păstrate după generarea răspunsului.",s4t:"Stocarea datelor",s4b:"Istoricul conversațiilor este stocat doar local pe dispozitivul dumneavoastră. Nu menținem conturi de utilizator și nu stocăm datele conversațiilor pe niciun server. Gestionarea abonamentelor este realizată integral prin framework-ul Apple StoreKit.",s5t:"Servicii terțe",s5b:"Aplicația noastră utilizează următoarele servicii terțe:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — pentru generarea răspunsurilor AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — ca intermediar pentru solicitările API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — pentru gestionarea abonamentelor'],s5e:"Nu utilizăm servicii de analiză, rețele publicitare sau tehnologii de urmărire.",s6t:"Confidențialitatea copiilor",s6b:"Aplicația noastră nu este destinată copiilor sub 13 ani. Nu colectăm în mod conștient informații personale de la copii. Deoarece colectăm doar un identificator al dispozitivului și nicio informație personală, aplicația prezintă un risc minim pentru confidențialitatea utilizatorilor de orice vârstă.",s7t:"Modificări ale acestei politici",s7b:"Putem actualiza această politică din când în când. Orice modificare va fi reflectată pe această pagină cu o dată de intrare în vigoare actualizată.",s8t:"Contactați-ne",s8b:"Dacă aveți întrebări despre această politică, contactați-ne:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
el:{t:"Πολιτική Απορρήτου",d:"Ημερομηνία ισχύος: 5 Μαΐου 2026",s1t:"Εισαγωγή",s1b:"Το TimelessDialogue (时空对话) αναπτύχθηκε από τον Xuchen Sun. Δεσμευόμαστε να προστατεύουμε το απόρρητό σας. Αυτή η πολιτική εξηγεί πώς χειριζόμαστε τις πληροφορίες όταν χρησιμοποιείτε την εφαρμογή μας, η οποία σας επιτρέπει να συνομιλείτε με ιστορικές προσωπικότητες μέσω τεχνητής νοημοσύνης.",s2t:"Συλλογή πληροφοριών",s2b:"Συλλέγουμε μόνο τις ακόλουθες πληροφορίες:",s2l:["Το identifierForVendor της συσκευής (ένα μοναδικό αναγνωριστικό που εκχωρείται από την Apple στη συσκευή σας για την εφαρμογή μας) — χρησιμοποιείται αποκλειστικά για περιορισμό ρυθμού και επαλήθευση συνδρομής."],s2n:"ΔΕΝ συλλέγουμε:",s2nl:["Προσωπικές πληροφορίες (όνομα, e-mail, τηλέφωνο)","Δεδομένα τοποθεσίας","Επαφές","Φωτογραφίες ή πολυμέσα","Ιστορικό περιήγησης","Οποιαδήποτε άλλα προσωπικά δεδομένα"],s3t:"Πώς χρησιμοποιούμε τις πληροφορίες",s3b:"Το identifierForVendor χρησιμοποιείται αποκλειστικά για:",s3l:["Περιορισμό ρυθμού αιτημάτων API για δίκαιη χρήση","Επαλήθευση κατάστασης συνδρομής"],s3e:"Οι συνομιλίες σας επεξεργάζονται μέσω του DeepSeek AI API μέσω Cloudflare Worker για τη δημιουργία απαντήσεων. Δεν αποθηκεύονται στους διακομιστές μας και δεν διατηρούνται μετά τη δημιουργία της απάντησης.",s4t:"Αποθήκευση δεδομένων",s4b:"Το ιστορικό συνομιλιών αποθηκεύεται μόνο τοπικά στη συσκευή σας. Δεν διατηρούμε λογαριασμούς χρηστών και δεν αποθηκεύουμε δεδομένα συνομιλιών σε κανέναν διακομιστή. Η διαχείριση συνδρομών γίνεται από το Apple StoreKit.",s5t:"Υπηρεσίες τρίτων",s5b:"Η εφαρμογή χρησιμοποιεί τις ακόλουθες υπηρεσίες τρίτων:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — για δημιουργία απαντήσεων AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — ως ενδιάμεσο για αιτήματα API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — για διαχείριση συνδρομών'],s5e:"Δεν χρησιμοποιούμε υπηρεσίες ανάλυσης, διαφημιστικά δίκτυα ή τεχνολογίες παρακολούθησης.",s6t:"Απόρρητο παιδιών",s6b:"Η εφαρμογή δεν απευθύνεται σε παιδιά κάτω των 13 ετών. Δεν συλλέγουμε εν γνώσει μας προσωπικές πληροφορίες από παιδιά. Δεδομένου ότι συλλέγουμε μόνο αναγνωριστικό συσκευής, η εφαρμογή παρουσιάζει ελάχιστο κίνδυνο απορρήτου για χρήστες κάθε ηλικίας.",s7t:"Αλλαγές στην πολιτική",s7b:"Ενδέχεται να ενημερώσουμε αυτή την πολιτική κατά καιρούς. Τυχόν αλλαγές θα αντικατοπτρίζονται σε αυτή τη σελίδα με ενημερωμένη ημερομηνία ισχύος.",s8t:"Επικοινωνία",s8b:"Εάν έχετε ερωτήσεις, επικοινωνήστε μαζί μας:",s8c:'Xuchen Sun<br>E-mail: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
he:{t:"מדיניות פרטיות",d:"תאריך תחילה: 5 במאי 2026",s1t:"מבוא",s1b:"TimelessDialogue (时空对话) פותח על ידי Xuchen Sun. אנו מחויבים להגן על פרטיותך. מדיניות פרטיות זו מסבירה כיצד אנו מטפלים במידע כאשר אתה משתמש באפליקציה שלנו, המאפשרת לך לשוחח עם דמויות היסטוריות באמצעות בינה מלאכותית.",s2t:"איסוף מידע",s2b:"אנו אוספים רק את המידע הבא:",s2l:["identifierForVendor של המכשיר (מזהה ייחודי שהוקצה על ידי Apple למכשיר שלך עבור האפליקציה שלנו) — משמש אך ורק להגבלת קצב ולאימות מנוי."],s2n:"אנו לא אוספים:",s2nl:['מידע אישי (שם, דוא"ל, מספר טלפון)',"נתוני מיקום","אנשי קשר","תמונות או מדיה","היסטוריית גלישה","כל מידע אישי אחר"],s3t:"כיצד אנו משתמשים במידע",s3b:"identifierForVendor של המכשיר משמש אך ורק עבור:",s3l:["הגבלת קצב בקשות API כדי להבטיח שימוש הוגן","אימות סטטוס מנוי"],s3e:"השיחות שלך מעובדות דרך DeepSeek AI API באמצעות Cloudflare Worker ליצירת תגובות. שיחות אלו אינן מאוחסנות בשרתים שלנו ואינן נשמרות לאחר יצירת התגובה.",s4t:"אחסון נתונים",s4b:"היסטוריית הצ'אט שלך מאוחסנת באופן מקומי במכשיר שלך בלבד. אנו לא מנהלים חשבונות משתמש ולא מאחסנים את נתוני השיחות שלך בשום שרת. ניהול המנויים מתבצע במלואו על ידי מסגרת Apple StoreKit.",s5t:"שירותי צד שלישי",s5b:"האפליקציה שלנו משתמשת בשירותי צד שלישי הבאים:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — ליצירת תגובות AI','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — כמתווך לבקשות API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — לניהול מנויים'],s5e:"אנו לא משתמשים בשירותי ניתוח, רשתות פרסום או טכנולוגיות מעקב.",s6t:"פרטיות ילדים",s6b:"האפליקציה שלנו אינה מיועדת לילדים מתחת לגיל 13. אנו לא אוספים ביודעין מידע אישי מילדים. מכיוון שאנו אוספים רק מזהה מכשיר ולא מידע אישי, האפליקציה מהווה סיכון מינימלי לפרטיות למשתמשים בכל גיל.",s7t:"שינויים במדיניות",s7b:"אנו עשויים לעדכן מדיניות זו מעת לעת. כל שינוי ישתקף בדף זה עם תאריך תחילה מעודכן.",s8t:"צור קשר",s8b:"אם יש לך שאלות לגבי מדיניות פרטיות זו, אנא צור איתנו קשר:",s8c:'Xuchen Sun<br>דוא"ל: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
hr:{t:"Pravila o privatnosti",d:"Datum stupanja na snagu: 5. svibnja 2026.",s1t:"Uvod",s1b:"TimelessDialogue (时空对话) razvio je Xuchen Sun. Posvećeni smo zaštiti vaše privatnosti. Ova pravila objašnjavaju kako postupamo s informacijama kada koristite našu aplikaciju, koja vam omogućuje razgovore s povijesnim ličnostima pomoću umjetne inteligencije.",s2t:"Prikupljanje informacija",s2b:"Prikupljamo samo sljedeće informacije:",s2l:["identifierForVendor uređaja (jedinstveni identifikator koji Apple dodjeljuje vašem uređaju za našu aplikaciju) — koristi se isključivo za ograničavanje brzine i provjeru pretplate."],s2n:"NE prikupljamo:",s2nl:["Osobne podatke (ime, e-poštu, telefonski broj)","Podatke o lokaciji","Kontakte","Fotografije ili medije","Povijest pregledavanja","Bilo koje druge osobne podatke"],s3t:"Kako koristimo informacije",s3b:"identifierForVendor uređaja koristi se isključivo za:",s3l:["Ograničavanje brzine API zahtjeva radi osiguravanja pravedne uporabe","Provjeru statusa pretplate"],s3e:"Vaši razgovori obrađuju se putem DeepSeek AI API-ja kroz Cloudflare Worker za generiranje odgovora. Ti razgovori ne pohranjuju se na našim poslužiteljima i ne zadržavaju se nakon generiranja odgovora.",s4t:"Pohrana podataka",s4b:"Vaša povijest razgovora pohranjuje se samo lokalno na vašem uređaju. Ne vodimo korisničke račune i ne pohranjujemo vaše podatke o razgovorima na nijednom poslužitelju. Upravljanje pretplatama u potpunosti obavlja Appleov StoreKit okvir.",s5t:"Usluge trećih strana",s5b:"Naša aplikacija koristi sljedeće usluge trećih strana:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — za generiranje AI odgovora','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — kao posrednik za API zahtjeve','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — za upravljanje pretplatama'],s5e:"Ne koristimo nikakve analitičke usluge, oglašivačke mreže ili tehnologije praćenja.",s6t:"Privatnost djece",s6b:"Naša aplikacija nije namijenjena djeci mlađoj od 13 godina. Ne prikupljamo svjesno osobne podatke djece. Budući da prikupljamo samo identifikator uređaja i nikakve osobne podatke, aplikacija predstavlja minimalan rizik za privatnost korisnika bilo koje dobi.",s7t:"Promjene ovih pravila",s7b:"Možemo povremeno ažurirati ova pravila. Sve promjene bit će prikazane na ovoj stranici s ažuriranim datumom stupanja na snagu.",s8t:"Kontaktirajte nas",s8b:"Ako imate pitanja o ovim pravilima, kontaktirajte nas:",s8c:'Xuchen Sun<br>E-pošta: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'},
ca:{t:"Política de privacitat",d:"Data d'entrada en vigor: 5 de maig de 2026",s1t:"Introducció",s1b:"TimelessDialogue (时空对话) ha estat desenvolupat per Xuchen Sun. Ens comprometem a protegir la vostra privacitat. Aquesta política de privacitat explica com gestionem la informació quan utilitzeu la nostra aplicació, que us permet conversar amb personatges històrics mitjançant intel·ligència artificial.",s2t:"Recollida d'informació",s2b:"Només recopilem la informació següent:",s2l:["L'identifierForVendor del dispositiu (un identificador únic assignat per Apple al vostre dispositiu per a la nostra aplicació) — utilitzat exclusivament per a la limitació de velocitat i la verificació de subscripcions."],s2n:"NO recopilem:",s2nl:["Informació personal (nom, correu electrònic, número de telèfon)","Dades de localització","Contactes","Fotos o mitjans","Historial de navegació","Qualsevol altra dada personal"],s3t:"Com utilitzem la informació",s3b:"L'identifierForVendor del dispositiu s'utilitza exclusivament per a:",s3l:["Limitar la velocitat de les sol·licituds d'API per garantir un ús equitatiu","Verificar l'estat de la subscripció"],s3e:"Les vostres converses es processen a través de l'API DeepSeek AI mitjançant un Cloudflare Worker per generar respostes. Aquestes converses no s'emmagatzemen als nostres servidors i no es conserven després de generar la resposta.",s4t:"Emmagatzematge de dades",s4b:"El vostre historial de xat s'emmagatzema únicament de forma local al vostre dispositiu. No mantenim comptes d'usuari ni emmagatzemem les vostres dades de conversa a cap servidor. La gestió de subscripcions és gestionada íntegrament pel framework StoreKit d'Apple.",s5t:"Serveis de tercers",s5b:"La nostra aplicació utilitza els serveis de tercers següents:",s5l:['<a href="https://www.deepseek.com/privacy" target="_blank">DeepSeek AI API</a> — per generar respostes d\'IA','<a href="https://www.cloudflare.com/privacypolicy/" target="_blank">Cloudflare</a> — com a intermediari per a les sol·licituds d\'API','<a href="https://www.apple.com/legal/privacy/" target="_blank">Apple StoreKit</a> — per a la gestió de subscripcions'],s5e:"No utilitzem cap servei d'anàlisi, xarxa publicitària ni tecnologia de seguiment.",s6t:"Privacitat dels infants",s6b:"La nostra aplicació no està dirigida a menors de 13 anys. No recopilem conscientment informació personal d'infants. Com que només recopilem un identificador de dispositiu i cap informació personal, l'aplicació presenta un risc mínim per a la privacitat dels usuaris de qualsevol edat.",s7t:"Canvis en aquesta política",s7b:"Podem actualitzar aquesta política periòdicament. Qualsevol canvi es reflectirà en aquesta pàgina amb una data d'entrada en vigor actualitzada.",s8t:"Contacteu-nos",s8b:"Si teniu qualsevol pregunta sobre aquesta política, poseu-vos en contacte amb nosaltres:",s8c:'Xuchen Sun<br>Correu electrònic: <a href="mailto:sunxuchen1991@gmail.com">sunxuchen1991@gmail.com</a>'}

function render(lang){
const t=T[lang]||T.en;
const dir=rtl.includes(lang)?'rtl':'ltr';
const c=document.getElementById('content');
c.setAttribute('dir',dir);

}

function detectLang(){
const h=location.hash.slice(1);
if(h&&T[h])return h;
const n=navigator.language||'en';
if(T[n])return n;
if(n.startsWith('zh')){if(n.includes('TW')||n.includes('HK')||n.includes('Hant'))return'zh-Hant';return'zh-Hans';}
if(n.startsWith('pt')&&n.includes('BR'))return'pt-BR';
const b=n.split('-')[0];
if(T[b])return b;
return'en';
}

const sel=document.getElementById('langSelect');
Object.entries(L).forEach(([c,n])=>{const o=document.createElement('option');o.value=c;o.textContent=n;sel.appendChild(o);});
const lang=detectLang();
sel.value=lang;
render(lang);
sel.addEventListener('change',function(){location.hash=this.value;render(this.value);});
window.addEventListener('hashchange',function(){const h=location.hash.slice(1);if(h&&T[h]){sel.value=h;render(h);}});
